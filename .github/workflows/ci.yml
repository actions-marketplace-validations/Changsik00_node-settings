name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: build & test (${{ matrix.os }} / Node ${{ matrix.node-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        node-version: [18.x, 20.x, 22.x]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Test (with coverage thresholds)
        run: pnpm test:coverage

      - name: Build
        run: pnpm build

      - name: Verify dist exports
        run: pnpm verify:dist

      - name: Verify CLI against sample
        run: pnpm verify:sample

      - name: Verify public API surface
        run: pnpm verify:api

      - name: Verify doc code blocks
        run: pnpm verify:docs

      - name: Verify pack contents
        run: pnpm verify:pack
