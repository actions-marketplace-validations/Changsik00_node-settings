name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    name: publish to npm
    runs-on: ubuntu-latest
    permissions:
      # `contents: write` lets the workflow create the GitHub Release
      # entry below. `id-token: write` is for npm OIDC publishing (a
      # future migration; harmless today).
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build

      - name: Publish
        run: pnpm publish --no-git-checks --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Extract changelog section for this tag
        run: node scripts/changelog-extract.mjs ${{ github.ref_name }} > RELEASE_NOTES.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: false
