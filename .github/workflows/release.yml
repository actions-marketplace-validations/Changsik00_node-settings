name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    name: publish to npm
    runs-on: ubuntu-latest
    permissions:
      # `contents: write` lets the workflow create the GitHub Release
      # entry below. `id-token: write` lets npm publish via OIDC
      # (Trusted Publishing) — no long-lived NPM_TOKEN required.
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build

      - name: Publish (OIDC / Trusted Publishing)
        # No NODE_AUTH_TOKEN — npm CLI detects the GitHub Actions
        # OIDC token (via id-token: write) and exchanges it for a
        # short-lived publish credential. The Trusted Publisher must
        # be configured on npm.com for this package:
        #   npm.com → @env-kit/node-settings → Settings →
        #   Trusted Publishers → GitHub Actions:
        #     repo owner:       Changsik00
        #     repo:             node-settings
        #     workflow file:    release.yml
        run: pnpm publish --no-git-checks --access public --provenance

      - name: Extract changelog section for this tag
        run: node scripts/changelog-extract.mjs ${{ github.ref_name }} > RELEASE_NOTES.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: false
