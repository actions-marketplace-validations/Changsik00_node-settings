name: Release

# Tag-triggered release workflow.
#
# What this job does:
#   1. Sanity-rebuilds the package and runs typecheck + tests.
#   2. Extracts the matching CHANGELOG section for the tag.
#   3. Creates the GitHub Release page with that body.
#
# What this job does NOT do:
#   - `npm publish` is intentionally manual (`npm publish --access public`
#     from a logged-in local shell) until the npm Trusted Publishing
#     handshake is finalized. See BACKLOG.md "Trusted Publishing
#     finalize" — the workflow file is otherwise ready for OIDC
#     (id-token: write is granted, --provenance flag tested locally).
#
# When Trusted Publishing is fixed:
#   - Re-add the publish step (see git history; commit c29c664).
#   - Optionally gate `Create GitHub Release` on `needs: publish` once
#     publish is reliable.

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    permissions:
      # `contents: write` lets the workflow create the GitHub Release
      # entry. `id-token: write` is kept for the eventual npm OIDC
      # migration — harmless when unused.
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build

      - name: Extract changelog section for this tag
        run: node scripts/changelog-extract.mjs ${{ github.ref_name }} > RELEASE_NOTES.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: false
